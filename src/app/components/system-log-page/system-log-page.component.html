<!-- ═══════════════════════  APP ROOT  ═══════════════════════ -->
<div id="app" style="max-width:1100px;margin:0 auto;padding:40px 24px 60px;">

	<!-- ── HEADER ── -->
	<div class="anim-slide-up" style="margin-bottom:32px;">
		<h1 style="font-size:26px;font-weight:800;letter-spacing:-.03em;color:var(--text-hi);">
			System Activity Monitoring
		</h1>
		<div style="display:flex;align-items:center;gap:12px;margin-top:10px;">
			<span class="badge"
				style="background:rgba(0,240,160,.1);color:var(--green);border:1px solid rgba(0,240,160,.22);">
				● SYSTEM HEALTHY
			</span>
			<span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-lo);"
				id="last-updated-label">Last updated: 42s ago</span>
		</div>
	</div>

	<!-- ── TOP GRID ── -->
	<div style="display:grid;grid-template-columns:1fr 320px;gap:18px;margin-bottom:18px;">

		<!-- Throughput Card -->
		<div class="card dot-bg scanline-host anim-slide-up" style="padding:26px 28px;animation-delay:.05s;">
			<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;">
				<div>
					<p
						style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--text-lo);text-transform:uppercase;margin-bottom:8px;">
						API Throughput
					</p>
					<div style="display:flex;align-items:baseline;gap:12px;">
						<span id="throughput-val" class="anim-count-up"
							style="font-size:48px;font-weight:800;letter-spacing:-.04em;color:var(--text-hi);animation-delay:.15s;">
							12,482
						</span>
						<span id="throughput-delta"
							style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--green);">
							+4.2%
						</span>
					</div>
				</div>
				<div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
					<div
						style="display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:9px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.18);">
						<span class="dot pulse-dot" style="background:var(--cyan);"></span>
						<span
							style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--cyan);">Live
							View</span>
					</div>
					<button
						style="width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text-lo);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;">⋮</button>
				</div>
			</div>

			<!-- Bar Chart -->
			<div id="bar-chart" style="display:flex;align-items:flex-end;gap:5px;height:88px;"></div>
		</div>

		<!-- Critical Warnings Card -->
		<div class="card card-top-line anim-slide-up"
			style="padding:26px;display:flex;flex-direction:column;animation-delay:.1s;background:linear-gradient(145deg,#0D1018,#111520);">
			<p
				style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--text-lo);text-transform:uppercase;margin-bottom:10px;">
				Critical Warnings
			</p>
			<div id="critical-count"
				style="font-size:80px;font-weight:800;letter-spacing:-.05em;line-height:1;color:var(--text-hi);flex:1;display:flex;align-items:flex-end;padding-bottom:4px;">
				02
			</div>
			<div style="margin-top:18px;">
				<p
					style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--text-lo);text-transform:uppercase;margin-bottom:7px;">
					Auth Latency Peak
				</p>
				<div class="track" style="margin-bottom:16px;">
					<div class="fill" id="latency-fill" style="width:72%;"></div>
				</div>
				<button class="btn-run" onclick="runDiagnosis(this)">RUN DIAGNOSIS</button>
			</div>
		</div>
	</div>

	<!-- ── LOG TABLE CARD ── -->
	<div class="card anim-slide-up" style="animation-delay:.15s;">

		<!-- Table top bar -->
		<div
			style="display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border-dim);">
			<h2 style="font-size:15px;font-weight:700;color:var(--text-hi);">Recent Logs</h2>
			<div style="display:flex;gap:8px;">
				<button class="btn-filter">⫛ FILTER</button>
				<button class="btn-export">↑ EXPORT CSV</button>
			</div>
		</div>

		<!-- Column labels -->
		<div class="tbl-header col-template" style="border-bottom:1px solid var(--border-dim);">
			<span
				style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--text-lo);text-transform:uppercase;">Timestamp</span>
			<span
				style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--text-lo);text-transform:uppercase;">Module</span>
			<span
				style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--text-lo);text-transform:uppercase;">Action</span>
			<span
				style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--text-lo);text-transform:uppercase;">Status</span>
			<span
				style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--text-lo);text-transform:uppercase;">Request
				ID</span>
			<span
				style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--text-lo);text-transform:uppercase;text-align:right;">Details</span>
		</div>

		<!-- Log Rows (rendered by TS) -->
		<div id="log-rows"></div>

		<!-- Footer -->
		<div
			style="display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-top:1px solid var(--border-dim);">
			<span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-lo);">
				Displaying 1–25 of 12,482 logs
			</span>
			<div style="display:flex;gap:5px;" id="pagination"></div>
		</div>
	</div>

	<!-- ── LIVE SYNC ── -->
	<div style="margin-top:22px;display:flex;justify-content:center;">
		<div class="live-bar">
			<span class="dot pulse-dot" style="background:var(--green);"></span>
			LIVE SYNCHRONIZING WITH MONOLITH CORE API
		</div>
	</div>

</div>
