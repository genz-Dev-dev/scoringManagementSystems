<div class="flex h-screen bg-gray-50 font-sans overflow-hidden">
  <!-- Skeleton Loader -->
  <div *ngIf="isLoading; else dashboardContent" class="flex h-screen w-full bg-gray-100">
    <!-- ===================== SIDEBAR SKELETON ===================== -->
    <aside class="flex flex-col bg-[#1a2a5e] p-4 w-64 space-y-6">
      <!-- Logo -->
      <div class="flex items-center gap-3 mb-4">
        <div class="h-10 w-10 rounded-full bg-blue-400 animate-pulse"></div>
        <div class="flex flex-col gap-1">
          <div class="h-3 w-24 bg-gray-300 rounded animate-pulse"></div>
          <div class="h-3 w-20 bg-gray-300 rounded animate-pulse"></div>
        </div>
      </div>
      <!-- Navigation Sections -->
      <div class="flex-1 space-y-4 overflow-y-auto">
        <ng-container *ngFor="let section of [1,2,3]">
          <div class="h-3 w-3/4 bg-gray-400 rounded animate-pulse mx-2 mb-2"></div>
          <ng-container *ngFor="let item of [1,2,3]">
            <div class="flex items-center gap-3 px-2 py-2">
              <div class="h-5 w-5 bg-gray-400 rounded-full animate-pulse"></div>
              <div class="h-4 w-3/4 bg-gray-400 rounded animate-pulse"></div>
            </div>
          </ng-container>
        </ng-container>
      </div>
    </aside>
    <!-- ===================== MAIN CONTENT SKELETON ===================== -->
    <div class="flex-1 flex flex-col p-6 space-y-6">
      <!-- Top Loading Text -->
      <span class="text-center text-lg font-semibold text-gray-600 animate-pulse">
        Your dashboard is loading...!!
      </span>
      <!-- Top Cards -->
      <div class="grid grid-cols-4 gap-4">
        <div class="h-24 w-full bg-gray-300 rounded animate-pulse"></div>
        <div class="h-24 w-full bg-gray-300 rounded animate-pulse"></div>
        <div class="h-24 w-full bg-gray-300 rounded animate-pulse"></div>
        <div class="h-24 w-full bg-gray-300 rounded animate-pulse"></div>
      </div>
      <!-- Main Content -->
      <div class="flex-1 bg-gray-300 rounded animate-pulse"></div>
    </div>
  </div>
  <ng-template #dashboardContent>
    <!-- ===================== SIDEBAR ===================== -->
    <button (click)="toggleSidebar()" type="button" aria-label="Toggle Sidebar"
      class="fixed top-4 left-4 z-50 md:hidden text-white p-2 rounded-full shadow-lg hover:bg-white/20 transition-colors duration-200">
      <i class="fas fa-bars text-lg"></i>
    </button>
    <div *ngIf="sidebarOpen()" (click)="closeSidebar()" class="fixed inset-0 z-30 md:hidden"></div>
    <aside class="fixed md:relative z-40 flex flex-col transition-all duration-300 bg-[#1a2a5e] text-white h-full"
      [class.w-64]="sidebarOpen()" [class.w-0]="!sidebarOpen()" [class.md:w-16]="!sidebarOpen()"
      [class.-translate-x-full]="!sidebarOpen()" [class.md:translate-x-0]="true"
      [class.overflow-hidden]="!sidebarOpen()">
      <!-- Logo -->
      <div class="flex items-center gap-3 px-4 py-5 border-b border-white/10 hover:cursor-pointer"
        (click)="onClickRouter('/')">
        <div class="w-9 h-9 flex-shrink-0 rounded-full overflow-hidden object-cover">
          <img
            src="https://imgs.search.brave.com/n73MXi5G8HjiafofL-OtcQ9QYxjQzV-vlYzHQP61AwI/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9zdGF0/aWMudmVjdGVlenku/Y29tL3N5c3RlbS9y/ZXNvdXJjZXMvdGh1/bWJuYWlscy8wMDUv/MTcwLzkyOC9zbWFs/bC9lZHVjYXRpb24t/bG9nby1kZXNpZ24t/Zm9yLXVuaXZlcnNp/dHktYW5kLWNvbGxl/Z2Utc2Nob29sLWZy/ZWUtdmVjdG9yLmpw/Zw"
            alt="university">
        </div>

        <div class="overflow-hidden transition-all duration-300" [class.w-0]="!sidebarOpen()">
          <p class="text-sm truncate font-bold leading-tight">សកលវិទ្យាល័យសម្តេចសង្ឃរាជ បួរ គ្រី
          </p>
          <p class="text-sm font-bold leading-tight">Bur Kari University</p>
        </div>
      </div>
      <!-- Navigation -->
      <nav class="flex-1 overflow-y-auto py-4 px-2 space-y-4">
        <div *ngFor="let section of navSections; trackBy: trackByTitle">
          @if(sidebarOpen()){
          <p class="text-[10px] font-semibold text-gray-300/70 tracking-widest px-2 mb-1">
            {{ section.title }}
          </p>
          }
          <button type="button" *ngFor="let item of section.items; trackBy: trackByLabel"
            (click)="onClickRouter(item.route)" aria-label="{{ item.label }}"
            class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-all duration-150 hover:cursor-pointer"
            [class.bg-blue-600]="item.active" [class.text-white]="item.active" [class.hover:bg-gray-600]="!item.active">
            <span class="w-5 h-5 flex-shrink-0 flex items-center justify-center text-base">
              <i [class]="item.icon"></i>
            </span>
            <span class="truncate transition-all duration-300" [class.hidden]="!sidebarOpen()">
              {{ item.label }}
            </span>
          </button>
        </div>
      </nav>
    </aside>
    <!-- ===================== MAIN CONTENT ===================== -->
    <div class="flex-1 flex flex-col overflow-hidden p-2">
      <header class="bg-gray-50 border-b border-gray-200 flex items-center justify-between px-6 py-3 gap-4">
        <!-- Toggle + Search -->
        <div class="flex items-center gap-4 flex-1">
          <button type="button" aria-label="Toggle Sidebar" (click)="toggleSidebar()"
            class="btn btn-ghost btn-sm btn-circle text-gray-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <div class="relative w-full max-w-sm">
            <label class="input input-bordered flex items-center gap-1 rounded-full">
              <i class="fa-solid fa-magnifying-glass me-1"></i>
              <input type="search" class="grow border-0 bg-transparent outline-none" placeholder="Search" />
            </label>
          </div>
        </div>
        <!-- Right actions -->
        <div class="flex items-center gap-3">
          <button type="button" aria-label="Message" class="relative btn btn-ghost btn-sm btn-circle">
            <span
              class="absolute top-0 right-0 -mt-1 -mr-1 w-3 h-3 rounded-full bg-blue-500 border-2 border-white"></span>
            <i class="fa-solid fa-comment text-gray-600 text-lg"></i>
          </button>
          <button type="button" aria-label="Notification" class="relative btn btn-ghost btn-sm btn-circle">
            <span
              class="absolute top-0 right-0 -mt-1 -mr-1 w-3 h-3 rounded-full bg-red-500 border-2 border-white"></span>
            <i class="fa-solid fa-bell text-lg"></i>
          </button>
          <div class="flex items-center gap-2 pl-2 border-l border-gray-200">
            <div class="dropdown dropdown-end">
              <div class="flex items-center gap-2 cursor-pointer" (click)="openModal()">
                <!-- Avatar -->
                <div class="avatar">
                  <div class="rounded-full w-10 h-10 flex items-center justify-center">
                    <i class="fa-solid fa-circle-user text-gray-600 text-3xl"></i>
                  </div>
                </div>
                <!-- User Info -->
                <div class="hidden sm:block text-left">
                  @if(User){
                  <p class="text-sm font-semibold text-gray-800 leading-none">
                    {{ User?.fullName }}
                  </p>
                  }
                  <p class="text-xs text-gray-600">{{ User?.email }}</p>
                </div>
              </div>
              <!-- Dropdown Menu -->
              <dialog #myModal class="modal">
                <div class="modal-box relative w-96">
                  <!-- Close Button -->
                  <button type="button"
                    class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2 is-size-5 icon-close"
                    aria-label="Close" (click)="closeModal()">
                    ✕
                  </button>
                  <!-- User Profile -->
                  <div class="flex flex-col items-center text-center space-y-1">
                    <!-- User Icon -->
                    <div class="flex flex-col items-center text-center">
                      <!-- Profile Icon -->
                      <div class="w-24 h-24 rounded-full flex items-center justify-center mb-3">
                        <i class="fa-solid fa-circle-user text-blue-500 text-6xl"></i>
                      </div>
                      <!-- User Info -->
                      <h3 class="text-xl font-bold">
                        {{ User?.fullName }}
                      </h3>
                      <p class="text-gray-600 text-sm mt-1">
                        {{ User?.email }}
                      </p>
                    </div>
                  </div>
                  <!-- Actions -->
                  <div class="mt-6 space-y-2">
                    <!-- Change Password -->
                    <button class="btn btn-outline w-full rounded-full" (click)="onClickRouter('forgot-password')">
                      <i class="fa-solid fa-key"></i> Change Password
                    </button>
                    <!-- Forgot Password -->
                    <button class="btn btn-outline w-full rounded-full" (click)="onClickRouter('forgot-password')">
                      <i class="fa-solid fa-lock"></i> Forgot Password
                    </button>
                    <!-- Logout -->
                    <button class="btn btn-error w-full rounded-full" (click)="handlelogoutAdminPage()">
                      <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout Account
                    </button>
                  </div>
                </div>
              </dialog>
            </div>
          </div>
        </div>
      </header>
      <!-- Page Body -->
      <main class="flex-1 overflow-y-auto p-3 space-y-4">
        <router-outlet></router-outlet>
      </main>
      <app-footer-admin-page></app-footer-admin-page>
    </div>
  </ng-template>
</div>
