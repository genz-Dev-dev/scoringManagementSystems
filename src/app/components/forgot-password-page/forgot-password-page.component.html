<div class="min-h-screen flex items-center justify-center bg-gray-100 p-4">
    <div class="w-full max-w-md bg-white rounded-lg shadow-md p-6 space-y-6">
        <!-- Title -->
        <h2 class="text-2xl font-bold text-center">Forgot Password</h2>
        <p class="text-center text-gray-600 text-sm">
            Enter your email to search your account
        </p>
        <!-- Step 1: Enter Email -->
        @if(step == 1){
        <form [formGroup]="forgotPasswordForm" class="space-y-4">
            <label class="block">
                <span class="text-gray-700">Email</span>
                <input type="email" formControlName="email" placeholder="you@example.com"
                    class="input input-bordered w-full mt-1 rounded-full" />
            </label>
            <button type="button" (click)="handleSendOTP()" class="btn btn-primary w-full rounded-full">
                Send OTP
            </button>
        </form>
        }
        <!-- Step 2: Enter OTP -->
        @if(step == 2){
        <div class="space-y-4 flex flex-col items-center">
            <p class="text-gray-600 text-sm text-center">
                We sent a 6-digit OTP to {{ email }}
            </p>
            <div
                class="relative w-full max-w-md p-6 flex flex-col items-center rounded-2xl border border-cyan-300 bg-gray-800/60 text-cyan-200 shadow-lg">
                <!-- Close Button -->
                <span
                    class="absolute top-2 right-2 w-8 h-8 flex items-center justify-center rounded-full bg-gray-700 text-red-500 cursor-pointer hover:bg-red-500 hover:text-white transition">
                    X
                </span>
                <!-- Info -->
                <div class="text-center mb-3">
                    <h2 class="text-white text-xl font-bold">
                        Two-Factor Verification
                    </h2>
                    <p class="text-white text-sm mt-2">
                        Enter the authentication code
                    </p>
                </div>
                <!-- OTP Inputs -->
                <div class="flex gap-2 justify-between">
                    <form [formGroup]="otpForm">
                        <input type="text" maxlength="1" formControlName="otp1"
                            class="w-10 h-10 text-center text-xl text-white bg-white/10 border border-white/40 rounded-xl focus:border-cyan-300 focus:ring-2 focus:ring-cyan-300 outline-none transition" />
                        <input type="text" maxlength="1" formControlName="otp2"
                            class="w-10 h-10 text-center text-xl text-white bg-white/10 border border-white/40 rounded-xl focus:border-cyan-300 focus:ring-2 focus:ring-cyan-300 outline-none transition" />
                        <input type="text" maxlength="1" formControlName="otp3"
                            class="w-10 h-10 text-center text-xl text-white bg-white/10 border border-white/40 rounded-xl focus:border-cyan-300 focus:ring-2 focus:ring-cyan-300 outline-none transition" />
                        <input type="text" maxlength="1" formControlName="otp4"
                            class="w-10 h-10 text-center text-xl text-white bg-white/10 border border-white/40 rounded-xl focus:border-cyan-300 focus:ring-2 focus:ring-cyan-300 outline-none transition" />
                        <input type="text" maxlength="1" formControlName="otp5"
                            class="w-10 h-10 text-center text-xl text-white bg-white/10 border border-white/40 rounded-xl focus:border-cyan-300 focus:ring-2 focus:ring-cyan-300 outline-none transition" />
                        <input type="text" maxlength="1" formControlName="otp6"
                            class="w-10 h-10 text-center text-xl text-white bg-white/10 border border-white/40 rounded-xl focus:border-cyan-300 focus:ring-2 focus:ring-cyan-300 outline-none transition" />
                    </form>
                </div>
                <!-- Buttons -->
                <div class="flex gap-2 mt-4">

                    <!-- Verify -->
                    <button (click)="handleVerifyOTP()"
                        class="px-4 py-2 rounded-lg border border-white/50 text-cyan-300 uppercase text-sm font-medium hover:bg-cyan-400 hover:text-white hover:shadow-lg transition">
                        Verify
                    </button>
                    <!-- Clear -->
                    <button
                        class="px-4 py-2 rounded-lg border border-white/50 text-red-400 uppercase text-sm font-medium hover:bg-red-500 hover:text-white hover:shadow-lg transition">
                        Clear
                    </button>
                </div>
            </div>
        </div>
        }
        <!-- Step 3: Change Password -->
        @if(step ==3){
        <div class="space-y-4">
            <form [formGroup]="changePasswordForm">

                <label class="block">
                    <span class="text-gray-700">New Password</span>
                    <input type="password" placeholder="New password" formControlName="newPassword"
                        class="input input-bordered w-full mt-1" />
                </label>

                <label class="block">
                    <span class="text-gray-700">Confirm Password</span>
                    <input type="password" placeholder="Confirm password" formControlName="confirmPassword"
                        class="input input-bordered w-full mt-1" />
                </label>

            </form>
            <button (click)="changePassword()" aria-label="Change Password" type="button"
                class="btn btn-success w-full">
                Change Password
            </button>
        </div>
        }
        <!-- Back link -->
        <div class="text-end mt-2">
            <a (click)="goToSignin('signin')" class="text-blue-600 hover:underline text-sm p-2 hover:cursor-pointer">
                Back to Signin
            </a>
        </div>
    </div>
</div>
